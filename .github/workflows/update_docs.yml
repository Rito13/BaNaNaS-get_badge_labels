name: Update Docs

on:
  schedule:
    - cron: "47 2 * * 0,2,5"
  workflow_dispatch:

jobs:
  update-docs:
    name: Update Docs
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Set up Python 3.x
      uses: actions/setup-python@v6
      with:
        python-version: 3.x

    - name: Download BaNaNaS
      run: git clone https://github.com/OpenTTD/BaNaNaS.git bananas

    - name: Install dependencies
      run: |
        echo "::group::Install ruff"
        curl -LsSf https://astral.sh/ruff/install.sh | sh
        echo "::endgroup::"

        echo "::group::Install PyYAML"
        python3 -m pip install PyYAML
        echo "::endgroup::"
      env:
        DEBIAN_FRONTEND: noninteractive

    - name: Download grf updates
      run: |
        cd bananas
        git diff --name-only --diff-filter=A $(cat ../last_bananas_commit) HEAD newgrf/ | cut -d / -f 2 | uniq > ../grfs_to_download
        cd ..

        mkdir grf_tars
        python3 Client.py $(cat grfs_to_download)
        rm grfs_to_download

        mkdir grfs
        cd grf_tars
        for file in *; do
          mkdir tmp
          tar -xC tmp -f $file
          cp tmp/*/*.grf ../grfs/${file}.grf
          rm -r tmp
        done
        cd ..

    - name: Update docs
      run: |
        python3 get_badge_labels.py
        ruff format

    - name: Update BaNaNaS commit hash
      run: |
        cd bananas
        git rev-parse HEAD > ../last_bananas_commit
        cd ..

    - name: Commit changes
      run: |
        date=$(date +'%Y-%m-%d_%H-%M')
        git add --all
        git config --global user.email "kapitan.cypek@gmail.com"
        git config --global user.name "Librarian (bot)"
        git commit -m "Update: with the state of BaNaNaS at $date."

    - name: Create Pull Request
      uses: peter-evans/create-pull-request@v8
      with:
        branch: update-docs
        branch-suffix: timestamp
        author: ${{ github.actor }} <${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com>
        committer: ${{ github.actor }} <${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com>
